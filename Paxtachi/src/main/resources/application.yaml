server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: Paxtachi

  datasource:
    url: jdbc:postgresql://localhost:5432/Paxtachi1223
    username: postgres
    password: 1223
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        validator:
          apply_to_ddl: false